<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | Future Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }
        .form-group label {
            font-weight: 600;
            color: var(--text-main);
        }
        .form-group input, .form-group textarea {
            padding: 12px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
    </style>
</head>
<body>
    <main class="container">
        <header class="main-header">
            <div class="title-wrapper">
                <span class="subtitle">Contact</span>
                <h1>お問い合わせ</h1>
            </div>
            <p>当サイトに関するご質問や不具合のご報告は、以下のフォームよりお送りください。</p>
        </header>

        <section class="panel">
            <form action="#" method="POST" id="contactForm">
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name" required placeholder="例: 山田 太郎">
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" required placeholder="例: example@mail.com">
                </div>
                <div class="form-group">
                    <label for="message">お問い合わせ内容</label>
                    <textarea id="message" name="message" required placeholder="お問い合わせ内容をご記入ください" style="font-family: inherit;"></textarea>
                </div>
                <div class="btn-container">
                    <button type="submit" class="primary-btn">送信する</button>
                </div>
            </form>
            <div class="btn-container" style="margin-top: 24px;">
                <a href="index.html"><button class="ghost-btn">トップページへ戻る</button></a>
            </div>
        </section>

        <script>
            document.getElementById('contactForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const message = document.getElementById('message').value;

                const subject = encodeURIComponent("【未来シミュレーション】お問い合わせ");
                const body = encodeURIComponent(
                    name + " 様からのメッセージ\n\n" +
                    "【返信用メールアドレス】\n" + email + "\n\n" +
                    "【お問い合わせ内容】\n" + message
                );

                // Open default email client
                window.location.href = "mailto:marimo.sht@icloud.com?subject=" + subject + "&body=" + body;
            });
        </script>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="about.html">運営者情報</a>
                <a href="privacy.html">プライバシーポリシー</a>
                <a href="contact.html">お問い合わせ</a>
            </div>
            <p><small>&copy; 2026 Future Simulation. All rights reserved.</small></p>
        </footer>
    </main>
</body>
</html>
